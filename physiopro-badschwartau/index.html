<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhysioPro Bad Schwartau — Meine Daten</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #faf8f4;
        color: #2c2825;
      }

      #root {
        min-height: 100vh;
      }

      /* Kontrast-Fix: sichtbarer Fokusring + deutlichere Platzhalter-Farbe
         auf allen Formularfeldern (vorher kaum erkennbar). */
      input::placeholder, textarea::placeholder {
        color: #7d7669;
        opacity: 1;
      }
      input:focus, select:focus, textarea:focus, button:focus-visible {
        outline: 2px solid #55725e;
        outline-offset: 1px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
